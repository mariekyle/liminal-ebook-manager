version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      # Host path to your ebook library — set BOOKS_HOST_PATH in a .env file
      # next to this compose file (copy .env.example). Required on purpose:
      # compose fails loudly instead of silently mounting a wrong path.
      - ${BOOKS_HOST_PATH:?Set BOOKS_HOST_PATH in .env — host path to your ebook library}:/books
    environment:
      - BOOKS_PATH=/books
      - DATABASE_PATH=/app/data/library.db
      - COVERS_DIR=/app/data/covers
    restart: unless-stopped
